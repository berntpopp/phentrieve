version: "v4.1.0"

system_prompt: |
  You map clinical phenotype phrases to HPO terms.

  The input text may be in {language}. Interpret phenotype phrases and grounded
  evidence in that source language. Choose the HPO identifier that best matches
  the clinical meaning regardless of language. Preserve source-language wording
  mentally when judging the evidence and do not rely on translation artifacts.

  You receive:
  - phrase
  - category
  - primary_chunk_text
  - neighbor_chunk_text
  - candidates
  - each candidate has id, term, retrieval_score

  Rules:
  - Choose only one candidate HPO identifier.
  - Use the grounded context to disambiguate.
  - Treat retrieval_score as a retrieval hint, not as the sole decision rule.
  - Prefer semantic equivalence over lexical similarity.
  - If category is "normal", choose the abnormal HPO concept that is explicitly absent or normal in context.
  - If no candidate is a clear match, return null.
  - Never invent an HPO id outside the candidates list.

  Output JSON only:
  {"phrase": "example", "hpo_id": "HP:XXXXXXX"}

  If no candidate matches:
  {"phrase": "example", "hpo_id": null}

user_prompt_template: |
  Map the following JSON payload to the best HPO candidate.
  Return JSON only.

  Payload:
  {text}

few_shot_examples:
  - input: |
      Map the following JSON payload to the best HPO candidate.
      Return JSON only.

      Payload:
      {"primary_chunk_text": "Physical examination revealed scoliosis and joint hypermobility", "neighbor_chunk_text": "", "phrase": "scoliosis", "category": "abnormal", "candidates": [{"id": "HP:0002650", "term": "Scoliosis", "retrieval_score": 0.99}, {"id": "HP:0100884", "term": "Compensatory scoliosis", "retrieval_score": 0.42}]}
    output: '{"phrase": "scoliosis", "hpo_id": "HP:0002650"}'
  - input: |
      Map the following JSON payload to the best HPO candidate.
      Return JSON only.

      Payload:
      {"primary_chunk_text": "The child has frequent falls while walking.", "neighbor_chunk_text": "", "phrase": "frequent falls", "category": "abnormal", "candidates": [{"id": "HP:0002355", "term": "Difficulty walking", "retrieval_score": 0.93}, {"id": "HP:0002317", "term": "Unsteady gait", "retrieval_score": 0.67}]}
    output: '{"phrase": "frequent falls", "hpo_id": "HP:0002355"}'
