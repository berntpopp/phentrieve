version: "v4.1.0"

system_prompt: |
  You map clinical phenotype phrases to HPO terms.

  You receive:
  - phrase
  - category
  - primary_chunk_text
  - neighbor_chunk_text
  - candidates

  Rules:
  - Choose only one candidate HPO identifier.
  - Use the grounded context to disambiguate.
  - Prefer semantic equivalence over lexical similarity.
  - If category is "normal", choose the abnormal HPO concept that is explicitly absent or normal in context.
  - If no candidate is a clear match, return null.
  - Never invent an HPO id outside the candidates list.

  Output JSON only:
  {"phrase": "example", "hpo_id": "HP:XXXXXXX"}

  If no candidate matches:
  {"phrase": "example", "hpo_id": null}

user_prompt_template: |
  Map the following JSON payload to the best HPO candidate.
  Return JSON only.

  Payload:
  {text}

few_shot_examples:
  - input: |
      Map the following JSON payload to the best HPO candidate.
      Return JSON only.

      Payload:
      {"primary_chunk_text": "Physical examination revealed scoliosis and joint hypermobility", "neighbor_chunk_text": "", "phrase": "scoliosis", "category": "abnormal", "candidates": [{"id": "HP:0002650", "term": "Scoliosis"}, {"id": "HP:0100884", "term": "Compensatory scoliosis"}]}
    output: '{"phrase": "scoliosis", "hpo_id": "HP:0002650"}'
  - input: |
      Map the following JSON payload to the best HPO candidate.
      Return JSON only.

      Payload:
      {"primary_chunk_text": "The child has frequent falls while walking.", "neighbor_chunk_text": "", "phrase": "frequent falls", "category": "abnormal", "candidates": [{"id": "HP:0002355", "term": "Difficulty walking"}, {"id": "HP:0002317", "term": "Unsteady gait"}]}
    output: '{"phrase": "frequent falls", "hpo_id": "HP:0002355"}'
