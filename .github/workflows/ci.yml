name: CI - Continuous Integration

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - '*.md'
      - 'plan/**'
      - 'LICENSE'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - '*.md'
      - 'plan/**'
      - 'LICENSE'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Detect which parts of the codebase changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'phentrieve/**'
              - 'api/**'
              - 'tests/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            docker:
              - '**/Dockerfile'
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'

  # Python Backend CI
  python-ci:
    name: Python CI
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      - name: Run Ruff format check
        run: |
          uv run ruff format --check phentrieve/ api/ tests/

      - name: Run Ruff linting
        run: |
          uv run ruff check phentrieve/ api/ tests/

      - name: Cache mypy
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            mypy-${{ matrix.python-version }}-

      - name: Run mypy type checking
        run: |
          uv run mypy phentrieve/ api/
        continue-on-error: true  # Don't fail on type errors (gradual typing)

      - name: Run pytest
        env:
          COVERAGE_CORE: sysmon
        run: |
          uv run pytest tests/ -v -m "not e2e" --cov=phentrieve --cov=api --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.10'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: python
          name: python-${{ matrix.python-version }}
        continue-on-error: true

  # Frontend CI
  frontend-ci:
    name: Frontend CI
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache ESLint
        uses: actions/cache@v4
        with:
          path: frontend/.eslintcache
          key: eslint-${{ hashFiles('frontend/package-lock.json', 'frontend/eslint.config.*') }}
          restore-keys: |
            eslint-

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Run Prettier format check
        working-directory: frontend
        run: npm run format:check

      - name: Run Vitest tests (with coverage on main, no coverage on PRs)
        working-directory: frontend
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm run test:ci
          else
            npm run test:coverage
          fi

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend
        continue-on-error: true

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: /api/v1

  # Docker Build Test
  docker-build-test:
    name: Docker Build Test
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        service: [api, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          docker system prune -af

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service == 'api' && '.' || './frontend' }}
          file: ${{ matrix.service == 'api' && './api/Dockerfile' || './frontend/Dockerfile' }}
          push: false
          tags: ghcr.io/berntpopp/phentrieve/${{ matrix.service }}:test
          # No caching for test builds - we just need to verify they complete
          build-args: |
            ${{ matrix.service == 'frontend' && 'VITE_API_URL=/api/v1' || '' }}

  # Dependency Review - blocks PRs with vulnerable dependencies
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # Only check runtime dependencies (skip dev dependencies)
          fail-on-scopes: runtime
          # License check disabled - focus on vulnerability scanning
          # Many Python/JS packages use non-SPDX licenses or multiple licenses
          license-check: false
          # Comment on PR with summary
          comment-summary-in-pr: on-failure

  # Summary job that requires all checks to pass
  # Note: dependency-review only runs on PRs, so we handle 'skipped' state gracefully
  ci-summary:
    name: CI Summary
    needs: [changes, python-ci, frontend-ci, docker-build-test, dependency-review]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check CI results
        run: |
          echo "## CI Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python CI | ${{ needs.python-ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend CI | ${{ needs.frontend-ci.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Review | ${{ needs.dependency-review.result }} |" >> $GITHUB_STEP_SUMMARY

          # Fail if any required job failed
          if [[ "${{ needs.python-ci.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-ci.result }}" == "failure" ]] || \
             [[ "${{ needs.docker-build-test.result }}" == "failure" ]]; then
            echo "❌ One or more CI jobs failed"
            exit 1
          fi

          # Dependency review failure on PRs is critical (skipped on push events is OK)
          if [[ "${{ needs.dependency-review.result }}" == "failure" ]]; then
            echo "❌ Dependency review found vulnerabilities"
            exit 1
          fi

          echo "✅ All CI checks passed"
