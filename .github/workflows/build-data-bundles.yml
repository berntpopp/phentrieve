name: Build Verified HPO Data Release

on:
  workflow_call:
    inputs:
      release_tag:
        description: Data-release tag owned by the caller repository.
        required: true
        type: string
      release_spec_path:
        description: Path to the immutable release JSON in the caller repository.
        required: true
        type: string
      source_commit:
        description: Immutable Phentrieve source commit used to build the indexes.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: Data-release tag.
        required: true
        type: string
      release_spec_path:
        description: Path to the immutable release JSON in the caller repository.
        required: true
        type: string
      source_commit:
        description: Immutable Phentrieve source commit used to build the indexes.
        required: true
        type: string

concurrency:
  group: hpo-data-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  build-and-draft:
    name: Build and Draft ${{ inputs.release_tag }}
    runs-on: [self-hosted, linux, x64, gpu]
    timeout-minutes: 720
    permissions:
      contents: write
    steps:
      - name: Checkout data-release repository
        uses: actions/checkout@v7
        with:
          path: data-release

      - name: Checkout pinned Phentrieve source
        uses: actions/checkout@v7
        with:
          repository: berntpopp/phentrieve
          ref: ${{ inputs.source_commit }}
          path: phentrieve

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: phentrieve/uv.lock

      - name: Install pinned dependencies
        working-directory: phentrieve
        run: uv sync --frozen --all-extras --dev

      - name: Build serial CUDA matrix
        working-directory: phentrieve
        run: |
          uv run python scripts/build_data_release.py \
            --spec "${GITHUB_WORKSPACE}/data-release/${{ inputs.release_spec_path }}" \
            --data-dir ".runs/${{ inputs.release_tag }}/data" \
            --output-dir "dist/${{ inputs.release_tag }}" \
            --device cuda

      - name: Run retrieval smoke checks
        working-directory: phentrieve
        run: |
          uv run python scripts/verify_data_release.py \
            --spec "${GITHUB_WORKSPACE}/data-release/${{ inputs.release_spec_path }}" \
            --bundle-dir "dist/${{ inputs.release_tag }}" \
            --smoke-test

      - name: Create caller-owned draft release
        working-directory: phentrieve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.release_tag }}" \
            --repo "${{ github.repository }}" \
            --draft \
            --title "HPO ${{ inputs.release_tag }}" \
            --notes "Verified HPO vector-index data release. See release-manifest.json and verification-report.json." \
            "dist/${{ inputs.release_tag }}"/*.tar.gz \
            "dist/${{ inputs.release_tag }}/SHA256SUMS" \
            "dist/${{ inputs.release_tag }}/release-manifest.json" \
            "dist/${{ inputs.release_tag }}/verification-report.json"
